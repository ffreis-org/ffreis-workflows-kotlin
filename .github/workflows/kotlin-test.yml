name: Kotlin Test

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version"
        required: false
        type: string
        default: "17"
      working-directory:
        description: "Directory containing the Gradle project"
        required: false
        type: string
        default: "."
      test-task:
        description: "Gradle test task. Android consumers pass 'testDebugUnitTest'."
        required: false
        type: string
        default: "test"
      upload-reports:
        description: "Upload test reports as an artifact"
        required: false
        type: boolean
        default: true
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      android-sdk:
        description: "Set up the Android SDK before the Gradle step (needed for Android Gradle Plugin projects; no-op cost for pure-JVM Kotlin consumers)."
        required: false
        type: boolean
        default: false

jobs:
  test:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Unit tests
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      TEST_TASK: ${{ inputs.test-task }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Set up Android SDK
        if: ${{ inputs.android-sdk }}
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Run tests
        run: |
          # shellcheck disable=SC2086  # intentional: $TEST_TASK may hold multiple space-separated Gradle tasks
          ./gradlew --no-daemon $TEST_TASK

      - name: Upload test reports
        if: ${{ always() && inputs.upload-reports }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotlin-test-reports
          path: ${{ inputs.working-directory }}/**/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 7
