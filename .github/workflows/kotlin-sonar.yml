name: Kotlin SonarCloud

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version"
        required: false
        type: string
        default: "17"
      working-directory:
        description: "Directory containing the Gradle project"
        required: false
        type: string
        default: "."
      test-with-coverage-task:
        description: "Gradle task(s) to run to generate coverage (e.g. 'test jacocoTestReport'). Leave empty to skip coverage generation."
        required: false
        type: string
        default: ""
      jacoco-report-path:
        description: "Relative path (inside working-directory) to the Jacoco XML report"
        required: false
        type: string
        default: "build/reports/jacoco/test/jacocoTestReport.xml"
      coverage-artifact-name:
        description: "Name of a pre-uploaded coverage artifact (skips running tests)"
        required: false
        type: string
        default: ""
      sonar-project-key:
        description: "SonarCloud project key (defaults to repository name)"
        required: false
        type: string
        default: ""
      sonar-organization:
        description: "SonarCloud organization slug"
        required: false
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      android-sdk:
        description: "Set up the Android SDK before generating coverage via Gradle (only relevant when test-with-coverage-task is set and coverage-artifact-name is not; no-op cost otherwise)."
        required: false
        type: boolean
        default: false
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonar:
    if: ${{ (inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false) && vars.SONAR_ENABLED == 'true' }}
    name: SonarCloud
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      # Gradle/Kotlin daemon config grows well past that (observed incident: an untuned Gradle
      # build JVM alone hit 2.4GB RSS, and together with a Kotlin compile daemon + aapt2 + the
      # runner agent in the same cgroup it OOM-killed the whole pod). Cap every JVM the coverage
      # step below starts: Gradle build JVM ceiling 1536m heap + 384m metaspace (~1.9Gi) + Kotlin
      # daemon ceiling 768m heap = ~2.6Gi total, leaving ~400Mi headroom under 3Gi for the runner
      # agent + aapt2 + OS. `--no-daemon` (below) already makes the Gradle daemon single-use;
      # disabling it here too is defense-in-depth. Harmless on GitHub-hosted ubuntu-latest.
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs="-Xmx1536m -XX:MaxMetaspaceSize=384m"
        -Dorg.gradle.workers.max=2
        -Dorg.gradle.daemon=false
        -Dkotlin.daemon.jvm.options=-Xmx768m
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Download coverage artifact
        if: inputs.coverage-artifact-name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.working-directory }}

      - name: Set up Android SDK
        if: inputs.android-sdk && inputs.coverage-artifact-name == '' && inputs.test-with-coverage-task != ''
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Generate coverage
        if: inputs.coverage-artifact-name == '' && inputs.test-with-coverage-task != ''
        env:
          COVERAGE_TASK: ${{ inputs.test-with-coverage-task }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086  # intentional: COVERAGE_TASK may hold multiple space-separated tasks
          ./gradlew --no-daemon $COVERAGE_TASK

      - name: Build Sonar extra args
        id: sonar-args
        env:
          PROJECT_KEY_INPUT: ${{ inputs.sonar-project-key }}
          PROJECT_KEY_VAR: ${{ vars.SONAR_PROJECT_KEY }}
          ORGANIZATION_INPUT: ${{ inputs.sonar-organization }}
          ORGANIZATION_VAR: ${{ vars.SONAR_ORGANIZATION }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          JACOCO_PATH: ${{ inputs.jacoco-report-path }}
          HAS_COVERAGE_ARTIFACT: ${{ inputs.coverage-artifact-name != '' }}
          HAS_COVERAGE_TASK: ${{ inputs.test-with-coverage-task != '' }}
        run: |
          set -euo pipefail
          PROJECT_KEY="${PROJECT_KEY_INPUT:-}"
          if [[ -z "$PROJECT_KEY" ]]; then
            PROJECT_KEY="${PROJECT_KEY_VAR:-}"
          fi
          if [[ -z "$PROJECT_KEY" && -f sonar-project.properties ]]; then
            PROJECT_KEY="$(grep -E '^sonar[.]projectKey=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi
          if [[ -z "$PROJECT_KEY" ]]; then
            OWNER_LOWER="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
            PROJECT_KEY="${OWNER_LOWER}_${REPO}"
          fi

          ORGANIZATION="${ORGANIZATION_INPUT:-}"
          if [[ -z "$ORGANIZATION" ]]; then
            ORGANIZATION="${ORGANIZATION_VAR:-}"
          fi
          if [[ -z "$ORGANIZATION" && -f sonar-project.properties ]]; then
            ORGANIZATION="$(grep -E '^sonar[.]organization=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi
          if [[ -z "$ORGANIZATION" ]]; then
            ORGANIZATION="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          fi

          EXTRA=""
          [[ -n "$PROJECT_KEY" ]] && EXTRA="$EXTRA -Dsonar.projectKey=$PROJECT_KEY"
          [[ -n "$ORGANIZATION" ]] && EXTRA="$EXTRA -Dsonar.organization=$ORGANIZATION"
          if [[ "$HAS_COVERAGE_ARTIFACT" == "true" || "$HAS_COVERAGE_TASK" == "true" ]]; then
            EXTRA="$EXTRA -Dsonar.coverage.jacoco.xmlReportPaths=${JACOCO_PATH}"
          fi
          echo "args=$EXTRA" >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            ${{ steps.sonar-args.outputs.args }}
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
