name: Kotlin Lint

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version"
        required: false
        type: string
        default: "17"
      working-directory:
        description: "Directory containing the Gradle project"
        required: false
        type: string
        default: "."
      lint-tasks:
        description: "Gradle lint tasks to run (space-separated). Android consumers pass e.g. 'ktlintCheck detekt lintDebug'."
        required: false
        type: string
        default: "ktlintCheck"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      android-sdk:
        description: "Set up the Android SDK before the Gradle step (needed for Android Gradle Plugin projects; no-op cost for pure-JVM Kotlin consumers)."
        required: false
        type: boolean
        default: false

jobs:
  lint:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Lint (ktlint / detekt)
    timeout-minutes: 20
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      LINT_TASKS: ${{ inputs.lint-tasks }}
      # Gradle/Kotlin daemon config grows well past that (observed incident: an untuned Gradle
      # build JVM alone hit 2.4GB RSS, and together with a Kotlin compile daemon + aapt2 + the
      # runner agent in the same cgroup it OOM-killed the whole pod). Cap every JVM this workflow
      # starts: Gradle build JVM ceiling 1536m heap + 384m metaspace (~1.9Gi) + Kotlin daemon
      # ceiling 768m heap = ~2.6Gi total, leaving ~400Mi headroom under 3Gi for the runner agent +
      # aapt2 + OS. `--no-daemon` (below) already makes the Gradle daemon single-use; disabling it
      # here too is defense-in-depth. Harmless on GitHub-hosted ubuntu-latest (ample headroom).
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs="-Xmx1536m -XX:MaxMetaspaceSize=384m"
        -Dorg.gradle.workers.max=2
        -Dorg.gradle.daemon=false
        -Dkotlin.daemon.jvm.options=-Xmx768m
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Set up Android SDK
        if: ${{ inputs.android-sdk }}
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Run Gradle lint tasks
        run: |
          # shellcheck disable=SC2086  # intentional: $LINT_TASKS holds multiple space-separated Gradle tasks
          ./gradlew --no-daemon $LINT_TASKS
