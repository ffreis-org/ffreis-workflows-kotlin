name: CI

# Self-test: exercises every kotlin-*.yml reusable workflow against examples/hello/.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows-policy:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5 # v1.6.0

  codeql-actions:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-codeql.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5 # v1.6.0
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/kotlin-lint.yml
    with:
      working-directory: examples/hello
      lint-tasks: ktlintCheck

  build:
    permissions:
      contents: read
    uses: ./.github/workflows/kotlin-build.yml
    with:
      working-directory: examples/hello
      build-task: build

  test:
    permissions:
      contents: read
    uses: ./.github/workflows/kotlin-test.yml
    with:
      working-directory: examples/hello
      test-task: test

  security:
    permissions:
      contents: read
    uses: ./.github/workflows/kotlin-security.yml
    with:
      working-directory: examples/hello

  sonar:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    uses: ./.github/workflows/kotlin-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
